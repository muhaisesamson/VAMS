<section class="panel">
  <span class="badge">Pension Committee</span>
  <h2 style="margin:14px 0 10px">Pension applications</h2>
  <p class="subtle">Set approved amounts and update the application status.</p>
  <div id="pensionList" class="list"></div>
</section>
<script>
window.renderAdminPanel = async function(role){
  const list = document.getElementById('pensionList');
  if (!list) return;

  const response = await fetch(`${window.API_BASE_URL}/api/admin/applications`, {
    headers: { "Authorization": `Bearer ${getToken()}` }
  });
  const result = await response.json();
  const apps = (result.data || []).filter(app => app.service_type === 'pension');
  

  document.getElementById('pensionCount').textContent = `(${apps.length})`;
  
  if (apps.length === 0) {
  list.innerHTML = `<p class="subtle">No pension applications submitted yet.</p>`;
  return;
  }


  list.innerHTML = apps.map((app) => `
    <div class="list-item" style="display:grid; gap:10px">
      <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap">
        <div>
          <strong>${app.full_name}</strong>
          <div class="subtle">${app.id} • ${new Date(app.submitted_at).toLocaleDateString()}</div>
        </div>
        <span class="pill yellow">${app.status}</span>
      </div>
      <label>
        Approved amount
        <input type="number" id="amount-${app.id}" value="${app.amount || 0}" />
      </label>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="soft-btn" type="button" onclick="reviewPension('${app.id}', 'approved')">Approve</button>
        <button class="ghost-btn" type="button" onclick="reviewPension('${app.id}', 'rejected')">Reject</button>
      </div>
    </div>
  `).join('');
};

window.reviewPension = async function(id, status){
  const amountInput = document.getElementById(`amount-${id}`);
  const amount = amountInput ? amountInput.value : null;
  await fetch(`${window.API_BASE_URL}/api/admin/applications/${id}`, {
    method: 'PATCH',
    headers: { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ status, amount })
  });
  window.renderAdminPanel('pension-committee');
};
</script>
