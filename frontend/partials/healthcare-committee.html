<section class="panel">
  <span class="badge">Healthcare Committee</span>
  <h2 style="margin:14px 0 10px">Healthcare applications</h2>
  <p class="subtle">Review care-level requests and confirm service coverage.</p>
  <div id="healthcareList" class="list"></div>
</section>
<script>
window.renderAdminPanel = async function(role){
  const list = document.getElementById('healthcareList');
  if (!list) return;

  const response = await fetch(`${window.API_BASE_URL}/api/admin/applications`, {
    headers: { "Authorization": `Bearer ${getToken()}` }
  });
  const result = await response.json();
  const apps = result.data || [];

  list.innerHTML = apps.map((app) => `
    <div class="list-item" style="display:grid; gap:10px">
      <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap">
        <div>
          <strong>${app.full_name}</strong>
          <div class="subtle">${app.id} • ${new Date(app.submitted_at).toLocaleDateString()}</div>
        </div>
        <span class="pill blue">${app.status}</span>
      </div>
      <label>
        Coverage level
        <input type="text" id="coverage-${app.id}" value="${app.coverage_value || 'Basic'}" />
      </label>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="soft-btn" type="button" onclick="reviewHealthcare('${app.id}', 'approved')">Approve</button>
        <button class="ghost-btn" type="button" onclick="reviewHealthcare('${app.id}', 'rejected')">Reject</button>
      </div>
    </div>
  `).join('');
};

window.reviewHealthcare = async function(id, status){
  const coverageInput = document.getElementById(`coverage-${id}`);
  const coverage_value = coverageInput ? coverageInput.value : null;
  await fetch(`${window.API_BASE_URL}/api/admin/applications/${id}`, {
    method: 'PATCH',
    headers: { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ status, coverage_value })
  });
  window.renderAdminPanel('healthcare-committee');
};
</script>
