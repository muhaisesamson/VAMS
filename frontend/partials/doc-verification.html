<section class="panel">
  <span class="badge">Document Verification Board</span>
  <h2 style="margin:14px 0 10px">Pending document review</h2>
  <p class="subtle">Review novice submissions and approve or reject each case.</p>
  <div id="docVerificationList" class="list"></div>
</section>
<script>
window.renderAdminPanel = async function(role){
  const list = document.getElementById('docVerificationList');
  if (!list) return;

  const response = await fetch(`${window.API_BASE_URL}/api/admin/documents`, {
    headers: { "Authorization": `Bearer ${getToken()}` }
  });
  const result = await response.json();
  const docs = result.data || [];

  list.innerHTML = docs.map((doc) => `
    <div class="list-item" style="justify-content:space-between; align-items:center">
      <div>
        <strong>${doc.full_name}</strong>
        <div class="subtle">${doc.file_path} • ${doc.doc_type} • ${doc.status}</div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="soft-btn" type="button" onclick="reviewDoc('${doc.id}', 'approved')">Approve</button>
        <button class="ghost-btn" type="button" onclick="reviewDoc('${doc.id}', 'rejected')">Reject</button>
      </div>
    </div>
  `).join('') || '<div class="note">No documents pending review.</div>';
};

window.reviewDoc = async function(id, status){
  await fetch(`${window.API_BASE_URL}/api/admin/documents/${id}`, {
    method: 'PATCH',
    headers: { "Authorization": `Bearer ${getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });
  window.renderAdminPanel('doc-verifier');
};
</script>
