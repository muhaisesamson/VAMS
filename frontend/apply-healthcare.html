<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Healthcare | Uganda Veterans Affairs Management System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="top-strip"></div>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2l8 4v6c0 5-3.2 8.9-8 10-4.8-1.1-8-5-8-10V6l8-4z" stroke="white" stroke-width="1.7"/>
            <path d="M8.3 12.1l2.4 2.4 5.1-5.1" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <strong>Healthcare request</strong>
          <span>Mock application form</span>
        </div>
      </a>
    </div>
  </header>
  <main class="section">
    <div class="container">
      <div class="form-card">
        <span class="badge">Healthcare</span>
        <h1 style="margin:12px 0">Submit healthcare application</h1>
        <form class="form-grid" style="margin-top:16px" id="healthcareForm">
          <div class="field">
            <label>Applicant name</label>
            <input type="text" id="applicantName" readonly />
          </div>
          <div class="field">
            <label>Preferred coverage</label>
            <select id="coverageValue">
              <option>Basic</option>
              <option>Comprehensive</option>
            </select>
          </div>
          <div class="field full">
            <label>Medical notes</label>
            <textarea rows="4" id="medicalNotes" placeholder="Describe the care request"></textarea>
          </div>
          <p id="healthcareMessage" style="display:none"></p>
          <button type="submit" class="cta-btn" id="submitBtn">Submit Application</button>
        </form>
      </div>
    </div>
    <div class="modal-overlay" id="notVerifiedModal">
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="notVerifiedTitle">
        <h3 id="notVerifiedTitle">Verification pending</h3>
        <p>Your account hasn't been verified yet, so you can't apply for services until an admin approves your registration. Please check back once you've been verified.</p>
        <button class="cta-btn" id="notVerifiedOkBtn" type="button">Okay</button>
      </div>
    </div>
  </main>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    requireAuth();
    const notVerifiedModal = document.getElementById('notVerifiedModal');
    document.getElementById('notVerifiedOkBtn').addEventListener('click', function(){
      notVerifiedModal.classList.remove('is-open');
      window.location.href = 'dashboard.html';
    });
    
    (async function checkVerification(){
      try {
        const res = await fetch(`${BASE_URL}/api/veteran/profile`, {
          headers: { 'Authorization': `Bearer ${getToken()}` }
        });
        const data = await res.json();
        if (data.success && data.data.verification_status !== 'approved') {
          notVerifiedModal.classList.add('is-open');
          document.getElementById('submitBtn').disabled = true;
        }
      } catch (err) {
        console.error('Verification check failed:', err);
      }
    })();
    const user = getUser();
    if (user) document.getElementById('applicantName').value = user.fullName || user.full_name || user.email;

    const form = document.getElementById('healthcareForm');
    const msg = document.getElementById('healthcareMessage');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage(msg);
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      
      try {
        const response = await fetch(`${BASE_URL}/api/applications`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${getToken()}`
          },
          body: JSON.stringify({
            service_type: 'healthcare',
            coverage_value: document.getElementById('coverageValue').value || null,
            notes: document.getElementById('medicalNotes').value.trim()
          })
        });

        if (response.status === 401) {
          localStorage.removeItem('vamsToken');
          localStorage.removeItem('vamsUser');
          window.location.href = 'login.html';
          return;
        }

        const data = await response.json();

        if (!response.ok && data.code === 'NOT_VERIFIED') {
          notVerifiedModal.classList.add('is-open');
          return;
        }

        if (!response.ok || !data.success) {
          setMessage(msg, data.message || 'Could not submit application.', 'error');
          return;
        }

        setMessage(msg, 'Application submitted successfully.', 'success');
        form.reset();
      } catch (err) {
        setMessage(msg, 'The server is unavailable. Please try again shortly.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit application';
      }
    });
  </script>
</body>
</html>
