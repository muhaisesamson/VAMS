<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Registration | Uganda Veterans Affairs Management System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="top-strip"></div>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2l8 4v6c0 5-3.2 8.9-8 10-4.8-1.1-8-5-8-10V6l8-4z" stroke="white" stroke-width="1.7"/>
            <path d="M8.3 12.1l2.4 2.4 5.1-5.1" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <strong>Admin access</strong>
          <span>Conceptual registration</span>
        </div>
      </a>
    </div>
  </header>
  <main class="section">
    <div class="container">
      <div class="form-card">
        <span class="badge">Admin onboarding</span>
        <h1 style="margin:12px 0">Create a committee account</h1>
        <form class="form-grid" style="margin-top:16px">
          <div class="field">
            <label>Full name</label>
            <input type="text" placeholder="e.g. Mary Akello" />
          </div>
          <div class="field">
            <label>Email address</label>
            <input type="email" placeholder="name@example.com" />
          </div>
          <div class="field">
            <label>Role</label>
            <select>
              <option value="doc-verifier">Document Verification Board</option>
              <option value="pension-committee">Pension Committee</option>
              <option value="healthcare-committee">Healthcare Committee</option>
              <option value="education-committee">Education Committee</option>
              <option value="super-admin">Super Administrator</option>
            </select>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" />
          </div>
          <div class="field full">
            <button class="cta-btn" type="button">Create mock account</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
