<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Pension | Uganda Veterans Affairs Management System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="top-strip"></div>
  <header class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2l8 4v6c0 5-3.2 8.9-8 10-4.8-1.1-8-5-8-10V6l8-4z" stroke="white" stroke-width="1.7"/>
            <path d="M8.3 12.1l2.4 2.4 5.1-5.1" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <strong>Pension request</strong>
          <span>Mock application form</span>
        </div>
      </a>
    </div>
  </header>
  <main class="section">
    <div class="container">
      <div class="form-card">
        <span class="badge">Pension</span>
        <h1 style="margin:12px 0">Submit pension application</h1>
        <form class="form-grid" style="margin-top:16px">
          <div class="field">
            <label>Applicant name</label>
            <input type="text" value="John Kato" />
          </div>
          <div class="field">
            <label>Service number</label>
            <input type="text" value="RA-001" />
          </div>
          <div class="field full">
            <label>Requested amount</label>
            <input type="number" value="1200000" />
          </div>
          <div class="field full">
            <label>Supporting notes</label>
            <textarea rows="4" placeholder="Describe your need or request"></textarea>
          </div>
          <button type="button" class="cta-btn">Submit mock request</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
